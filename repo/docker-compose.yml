services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civicsort
      POSTGRES_USER: civicsort
      POSTGRES_PASSWORD: civicsort_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicsort -d civicsort"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Actix-web Backend ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://civicsort:civicsort_secret@db:5432/civicsort
      BIND_ADDRESS: "0.0.0.0:8080"
      RUST_LOG: info
      CIVICSORT_MASTER_KEY: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
      CIVICSORT_IMAGE_DIR: /app/data/images
      CIVICSORT_EXPORT_DIR: /app/data/exports
      CIVICSORT_BOOTSTRAP_ADMIN: "1"
    volumes:
      - app_images:/app/data/images
      - app_exports:/app/data/exports
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Yew Frontend (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  app_images:
  app_exports:
